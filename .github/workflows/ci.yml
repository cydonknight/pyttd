name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v

  test-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run tests (record-only, no fork)
        run: pytest tests/ -v -k "not checkpoint"

  asan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install with ASAN
        env:
          CFLAGS: "-fsanitize=address -fno-omit-frame-pointer"
          LDFLAGS: "-fsanitize=address"
        run: pip install -e ".[dev]"

      - name: Find ASAN library
        id: asan
        run: echo "lib=$(gcc -print-file-name=libasan.so)" >> "$GITHUB_OUTPUT"

      - name: Run tests under ASAN
        env:
          LD_PRELOAD: ${{ steps.asan.outputs.lib }}
          ASAN_OPTIONS: "detect_leaks=0"
        run: pytest tests/ -v -x

  vsix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vscode-pyttd/package-lock.json

      - name: Install dependencies
        working-directory: vscode-pyttd
        run: npm ci

      - name: Type check
        working-directory: vscode-pyttd
        run: npx tsc --noEmit

      - name: Build VSIX
        working-directory: vscode-pyttd
        run: npx vsce package --no-dependencies

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: vscode-pyttd/*.vsix

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist

      - name: Install from sdist
        run: |
          pip install dist/*.tar.gz
          python -c "import pyttd_native; print('C extension loaded')"
          pyttd --version

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  benchmark:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run component benchmarks
        run: pytest benchmarks/bench_components.py benchmarks/bench_flush.py --benchmark-json=benchmark-results.json -v -s

      - name: Run overhead benchmarks
        run: python benchmarks/bench_overhead.py --iterations 3

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results.json
